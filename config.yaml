# World Cup 2026 Predictor Configuration
# ========================================

# Data paths
paths:
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  video_dir: "data/video"
  weights_dir: "weights"

# StatsBomb competition IDs
competitions:
  fifa_world_cup: 43
  uefa_euro: 55
  copa_america: 223
  afc_asian_cup: 1

# Season IDs for World Cups (only these are available in StatsBomb free data)
# Check available data: https://github.com/statsbomb/open-data
seasons:
  wc_2022: 106
  wc_2018: 3
  # Note: 2014 and 2010 World Cups are NOT in StatsBomb free data
  # euro_2024: 282
  # euro_2020: 55

# Model hyperparameters
model:
  player_feature_dim: 64
  hidden_dim: 128
  style_latent_dim: 4
  lstm_input_size: 4
  lstm_num_layers: 2
  lstm_dropout: 0.3
  gnn_type: "gcn"  # "gcn" or "gat"
  classifier_dropout: 0.4

# Training settings
training:
  batch_size: 16  # Smaller batch for better generalization
  epochs: 100  # More epochs with early stopping
  learning_rate: 0.0005  # Lower LR for stability
  weight_decay: 0.01  # Stronger regularization
  sequence_window: 20
  device: "auto"  # "auto", "cuda", "cpu"
  label_smoothing: 0.1  # Helps with calibration
  early_stopping_patience: 15  # Stop if no improvement

# Autoencoder pre-training
autoencoder:
  epochs: 100
  learning_rate: 0.001

# LSTM pre-training
lstm:
  epochs: 50
  learning_rate: 0.001

# Backtesting folds
backtest:
  fold1:
    train_end: 2017
    test_year: 2018
  fold2:
    train_end: 2021
    test_year: 2022

# Vision pipeline (YOLOv8)
vision:
  model_path: "weights/yolov8_soccernet.pt"
  confidence_threshold: 0.4
  frame_skip: 5

# Streamlit app
app:
  page_title: "WC 2026 Match Simulator"
  page_icon: "⚽"
