<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="330" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2328">Argentina vs England — What-If Scenario Probabilities</text>
  <!-- legend -->
  <g font-size="12" fill="#1f2328">
    <rect x="220" y="44" width="14" height="14" fill="#2da44e" rx="2"/><text x="240" y="55">ARG win</text>
    <rect x="330" y="44" width="14" height="14" fill="#d4a72c" rx="2"/><text x="350" y="55">Draw</text>
    <rect x="420" y="44" width="14" height="14" fill="#cf222e" rx="2"/><text x="440" y="55">ENG win</text>
  </g>
  <!-- Scenario 1 -->
  <text x="130" y="105" text-anchor="end" font-size="12" fill="#1f2328">Baseline</text>
  <rect x="140" y="86" width="313" height="30" fill="#2da44e"/>
  <rect x="453" y="86" width="130" height="30" fill="#d4a72c"/>
  <rect x="583" y="86" width="97" height="30" fill="#cf222e"/>
  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="296" y="106">58%</text>
    <text x="518" y="106">24%</text>
    <text x="631" y="106">18%</text>
  </g>
  <!-- Scenario 2 -->
  <text x="130" y="160" text-anchor="end" font-size="12" fill="#1f2328">
    <tspan x="130" dy="0">Tiki-taka + press</tspan>
    <tspan x="130" dy="15">vs low block</tspan>
  </text>
  <rect x="140" y="146" width="346" height="30" fill="#2da44e"/>
  <rect x="486" y="146" width="119" height="30" fill="#d4a72c"/>
  <rect x="605" y="146" width="75" height="30" fill="#cf222e"/>
  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="313" y="166">64%</text>
    <text x="545" y="166">22%</text>
    <text x="642" y="166">14%</text>
  </g>
  <!-- Scenario 3 -->
  <text x="130" y="220" text-anchor="end" font-size="12" fill="#1f2328">
    <tspan x="130" dy="0">ENG in-form,</tspan>
    <tspan x="130" dy="15">ARG fatigued</tspan>
  </text>
  <rect x="140" y="206" width="254" height="30" fill="#2da44e"/>
  <rect x="394" y="206" width="146" height="30" fill="#d4a72c"/>
  <rect x="540" y="206" width="140" height="30" fill="#cf222e"/>
  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="267" y="226">47%</text>
    <text x="467" y="226">27%</text>
    <text x="610" y="226">26%</text>
  </g>
  <!-- axis -->
  <line x1="140" y1="256" x2="680" y2="256" stroke="#d0d7de"/>
  <g font-size="11" fill="#57606a" text-anchor="middle">
    <text x="140" y="272">0%</text>
    <text x="275" y="272">25%</text>
    <text x="410" y="272">50%</text>
    <text x="545" y="272">75%</text>
    <text x="680" y="272">100%</text>
  </g>
  <text x="380" y="310" text-anchor="middle" font-size="11" fill="#8c959f">Illustrative output of the Streamlit what-if simulator (src/app.py) — slider-driven style and form perturbations</text>
</svg>
