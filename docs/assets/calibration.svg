<svg xmlns="http://www.w3.org/2000/svg" width="480" height="420" viewBox="0 0 480 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="480" height="420" fill="#ffffff"/>
  <text x="240" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2328">Reliability Diagram — P(Win), Fold 2 (WC 2022)</text>
  <!-- axes -->
  <line x1="70" y1="350" x2="430" y2="350" stroke="#57606a"/>
  <line x1="70" y1="350" x2="70" y2="50" stroke="#57606a"/>
  <!-- perfect calibration diagonal -->
  <line x1="70" y1="350" x2="430" y2="50" stroke="#d0d7de" stroke-dasharray="6,4" stroke-width="2"/>
  <!-- model curve points: (predicted, observed) approx on diagonal -->
  <polyline points="106,322 142,289 178,259 214,222 250,196 286,157 322,128 358,95 394,71" fill="none" stroke="#1a7f37" stroke-width="2.5"/>
  <g fill="#1a7f37">
    <circle cx="106" cy="322" r="4"/>
    <circle cx="142" cy="289" r="4"/>
    <circle cx="178" cy="259" r="4"/>
    <circle cx="214" cy="222" r="4"/>
    <circle cx="250" cy="196" r="4"/>
    <circle cx="286" cy="157" r="4"/>
    <circle cx="322" cy="128" r="4"/>
    <circle cx="358" cy="95" r="4"/>
    <circle cx="394" cy="71" r="4"/>
  </g>
  <!-- labels -->
  <g font-size="12" fill="#57606a">
    <text x="250" y="385" text-anchor="middle">Predicted probability</text>
    <text x="24" y="200" transform="rotate(-90 24 200)" text-anchor="middle">Observed frequency</text>
    <text x="70" y="366" text-anchor="middle">0.0</text>
    <text x="250" y="366" text-anchor="middle">0.5</text>
    <text x="430" y="366" text-anchor="middle">1.0</text>
  </g>
  <g font-size="12">
    <line x1="300" y1="310" x2="330" y2="310" stroke="#d0d7de" stroke-dasharray="6,4" stroke-width="2"/>
    <text x="336" y="314" fill="#57606a">Perfect</text>
    <line x1="300" y1="330" x2="330" y2="330" stroke="#1a7f37" stroke-width="2.5"/>
    <text x="336" y="334" fill="#57606a">TacticalNet (GAT)</text>
  </g>
  <text x="240" y="408" text-anchor="middle" font-size="11" fill="#8c959f">Illustrative — label smoothing (0.1) keeps probabilities near the diagonal</text>
</svg>
