<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2328">3-Class Accuracy — Time-Series Backtest (avg of 2018 + 2022 folds)</text>
  <!-- gridlines -->
  <g stroke="#e1e4e8" stroke-width="1">
    <line x1="80" y1="340" x2="680" y2="340"/>
    <line x1="80" y1="297" x2="680" y2="297"/>
    <line x1="80" y1="254" x2="680" y2="254"/>
    <line x1="80" y1="211" x2="680" y2="211"/>
    <line x1="80" y1="168" x2="680" y2="168"/>
    <line x1="80" y1="125" x2="680" y2="125"/>
    <line x1="80" y1="82" x2="680" y2="82"/>
  </g>
  <!-- y labels -->
  <g font-size="12" fill="#57606a" text-anchor="end">
    <text x="72" y="344">0%</text>
    <text x="72" y="301">10%</text>
    <text x="72" y="258">20%</text>
    <text x="72" y="215">30%</text>
    <text x="72" y="172">40%</text>
    <text x="72" y="129">50%</text>
    <text x="72" y="86">60%</text>
  </g>
  <!-- bars -->
  <rect x="110" y="117" width="70" height="223" fill="#9aa5b1" rx="3"/>
  <rect x="230" y="107" width="70" height="233" fill="#7d8fa3" rx="3"/>
  <rect x="350" y="88" width="70" height="252" fill="#5b7da3" rx="3"/>
  <rect x="470" y="68" width="70" height="272" fill="#2da44e" rx="3"/>
  <rect x="590" y="62" width="70" height="278" fill="#1a7f37" rx="3"/>
  <!-- bar value labels -->
  <g font-size="13" font-weight="bold" fill="#1f2328" text-anchor="middle">
    <text x="145" y="110">52.1%</text>
    <text x="265" y="100">54.3%</text>
    <text x="385" y="81">58.7%</text>
    <text x="505" y="61">63.4%</text>
    <text x="625" y="55">64.8%</text>
  </g>
  <!-- x labels -->
  <g font-size="12" fill="#57606a" text-anchor="middle">
    <text x="145" y="360">Elo</text>
    <text x="265" y="360">Dixon-Coles</text>
    <text x="385" y="360">XGBoost</text>
    <text x="505" y="360">TacticalNet</text>
    <text x="505" y="376">(GCN)</text>
    <text x="625" y="360">TacticalNet</text>
    <text x="625" y="376">(GAT)</text>
  </g>
  <text x="360" y="408" text-anchor="middle" font-size="11" fill="#8c959f">Illustrative backtest figures — regenerate with `make train &amp;&amp; make evaluate`</text>
</svg>
